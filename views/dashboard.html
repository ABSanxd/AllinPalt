<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Panel en Tiempo Real</h2>
    <div>
        <button id="btnStartCapture" class="btn btn-palt me-2"><i class="fas fa-play"></i> Iniciar</button>
        <button id="btnStopCapture" class="btn btn-outline-danger"><i class="fas fa-stop"></i> Detener</button>
    </div>
</div>

<div class="row g-4 mb-4">
    <div class="col-md-3">
        <div class="custom-card stat-box">
            <div class="stat-label">Total Procesadas</div>
            <div class="stat-value" id="totalPaltas">0</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="custom-card stat-box">
            <div class="stat-label">Estado: Buenas</div>
            <div class="stat-value text-success" id="paltasBuenas">0</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="custom-card stat-box">
            <div class="stat-label">Defectuosas</div>
            <div class="stat-value text-danger" id="paltasMalas">0</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="custom-card stat-box">
            <div class="stat-label">Lote Actual</div>
            <div class="stat-value fs-4 text-muted" id="currentLote">---</div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="custom-card">
            <h5 class="mb-4"><i class="fas fa-video me-2 text-palt"></i> Previsualización de Banda</h5>
            <div class="bg-dark rounded position-relative d-flex align-items-center justify-content-center" style="height: 400px;">
                <i class="fas fa-video-slash text-white-50 fs-1"></i>
                <div class="position-absolute top-0 start-0 p-3">
                    <span class="badge bg-danger">LIVE FEED</span>
                </div>
            </div>
        </div>
    </div>
    <div class="col-lg-4">
        <div class="custom-card">
            <h5 class="mb-3"><i class="fas fa-microchip me-2 text-palt"></i> Monitor de Sistema</h5>
            <div id="log-monitor"></div>
        </div>
    </div>
</div>
