<h2 class="mb-4">Registro de Nuevo Lote</h2>
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="custom-card">
            <form id="loteForm">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Proveedor</label>
                        <input type="text" id="proveedor" class="form-control" placeholder="Nombre de la empresa" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Lugar de Origen (Ciudad/Provincia)</label>
                        <input type="text" id="lugar_origen" class="form-control" placeholder="Ej: Trujillo, Piura, Ica" required>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Temperatura Ambiente (°C)</label>
                        <input type="number" id="temperatura" class="form-control" step="0.01" placeholder="25.00">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha de Cosecha</label>
                        <input type="date" id="fecha_cosecha" class="form-control">
                    </div>
                </div>
                <div class="row mb-4">
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Temperatura Climática Futura Estimada (°C)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="fas fa-cloud-sun"></i></span>
                            <input type="text" id="clima_futuro_preview" class="form-control bg-light" readonly placeholder="Calculando con la ubicación de la planta..." style="cursor: not-allowed;">
                        </div>
                        <div id="clima_feedback_lbl" class="form-text small text-muted">El sistema calcula el pronóstico de 5 días en base a la ubicación real de la planta.</div>
                    </div>
                </div>
                <button type="submit" class="btn btn-palt w-100 py-3"><i class="fas fa-save me-2"></i> Registrar Lote e Iniciar Trazabilidad</button>
            </form>
        </div>
    </div>
</div>
