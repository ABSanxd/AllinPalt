<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllinPalt - Sistema Inteligente</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="p-4">
            <h3 class="fw-bold"><span class="fs-4">🥑</span> ALLIN<span style="color: var(--light-green)">PALT</span></h3>
            <p class="small mb-0" style="color: rgba(255,255,255,0.6);">V2.2 - Panel Modular</p>
        </div>
        <nav class="mt-4">
            <a href="#dashboard" class="nav-link active">
                <i class="fas fa-chart-line"></i> Dashboard
            </a>
            <a href="#registro" class="nav-link">
                <i class="fas fa-plus-circle"></i> Nuevo Lote
            </a>
            <a href="#historial" class="nav-link">
                <i class="fas fa-history"></i> Historial
            </a>
            <a href="#predicciones" class="nav-link">
                <i class="fas fa-brain"></i> Predicciones
            </a>
        </nav>
        <div class="position-absolute bottom-0 p-4 w-100">
            <div class="d-flex align-items-center bg-white bg-opacity-10 p-2 rounded">
                <div class="status-dot bg-danger me-2" id="statusDot"></div>
                <small id="statusText">SISTEMA OFFLINE</small>
            </div>
        </div>
    </div>

    <!-- Main Content Container -->
    <div id="content">
        <div id="view-container">
            <!-- Dynamic content will be loaded here -->
            <div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Genérico Reutilizable -->
    <div class="modal fade" id="systemModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px; overflow: hidden;">
                <div id="modalHeader" class="modal-header border-0 p-4">
                    <h5 class="modal-title fw-bold" id="modalTitle">Título</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    <div id="modalIcon" class="mb-3 fs-1"></div>
                    <p id="modalBody" class="fs-5 text-muted mb-0">Mensaje del sistema...</p>
                </div>
                <div class="modal-footer border-0 p-4 pt-0 d-flex justify-content-center">
                    <button type="button" id="btnModalCancel" class="btn btn-light px-4 py-2" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btnModalConfirm" class="btn btn-palt px-4 py-2">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts (Modularized) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/components.js"></script>
    <script src="assets/js/modules/lotes.js"></script>
    <script src="assets/js/ui/vision-canvas.js"></script>
    <script src="assets/js/modules/vision.js"></script>
    <script src="assets/js/modules/history.js"></script>
    <script src="assets/js/modules/predictions.js"></script>
    <script src="assets/js/core/main.js"></script>
</body>
</html>
